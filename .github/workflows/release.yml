name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'          # matches 1.0.0, 2.1.3, etc.
      - '[0-9]+.[0-9]+.[0-9]+-*'        # matches 1.0.0-beta.1, etc.

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer

      - name: Build (release)
        run: swift build -c release

      - name: Run tests
        run: swift test --parallel

      - name: Extract changelog entry
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Extract the section for this tag from CHANGELOG.md
          NOTES=$(awk "/^## \[${TAG}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          # Write to file to preserve newlines
          echo "$NOTES" > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AIAnalyticsKit ${{ github.ref_name }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
